databaseChangeLog:
  - changeSet:
      id: shared-roles
      author: system
      changes:
        - createTable:
            schemaName: shared
            tableName: roles
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamp
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: true
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: true

  - changeSet:
      id: shared-roles-unique
      author: system
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            sql: |
              CREATE UNIQUE INDEX idx_unique_role_name ON shared.roles (name) WHERE deleted_at IS NULL;
