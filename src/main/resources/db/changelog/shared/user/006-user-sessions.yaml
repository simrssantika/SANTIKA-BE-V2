databaseChangeLog:
  - changeSet:
      id: shared-user-sessions
      author: system
      changes:
        - createTable:
            schemaName: shared
            tableName: user_sessions
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              # jti access-token yang sedang aktif (rotasi tiap refresh)
              - column:
                  name: jti
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: device_info
                  type: varchar(255)
              - column:
                  name: ip_address
                  type: varchar(64)
              - column:
                  name: user_agent
                  type: varchar(512)
              - column:
                  name: revoked_at
                  type: timestamp
              - column:
                  name: revoked_reason
                  type: varchar(50)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: last_used_at
                  type: timestamp
              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableSchemaName: shared
            baseTableName: user_sessions
            baseColumnNames: user_id
            referencedTableSchemaName: shared
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_sessions_user_id
            onDelete: CASCADE

        - createIndex:
            schemaName: shared
            tableName: user_sessions
            indexName: uq_user_sessions_jti
            unique: true
            columns:
              - column:
                  name: jti

        - createIndex:
            schemaName: shared
            tableName: user_sessions
            indexName: idx_user_sessions_user_id
            columns:
              - column:
                  name: user_id
