databaseChangeLog:
  - changeSet:
      id: darurat-pegawai
      author: ridlo
      changes:
        - createTable:
            schemaName: kepegawaian
            tableName: darurat_pegawai
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: kode_emergency
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: nama_emergency
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamp
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: true
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: true

  - changeSet:
      id: darurat-pegawai-index
      author: ridlo
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            sql: |
              CREATE UNIQUE INDEX idx_unique_kode_darurat_pegawai ON kepegawaian.darurat_pegawai (kode_emergency) WHERE (deleted_at IS NULL);
